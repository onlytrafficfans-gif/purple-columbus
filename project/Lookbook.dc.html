<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0c; }
    * { box-sizing: border-box; }
    ::selection { background: #9b30ff; color: #fff; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: #c084fc; }
  </style>
</helmet>

<div style="position: relative; width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0a0a0c; color: #f2f0f4; font-family: 'Barlow', sans-serif;">

  <div style="display: flex; align-items: center; justify-content: space-between; padding: 18px 22px;">
    <a href="Purple Columbus Homepage.dc.html" style="display: flex; align-items: center; gap: 8px; color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.14em;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><path d="m11 18-6-6 6-6"></path></svg>
      HOME
    </a>
    <div style="display: flex; align-items: center; gap: 18px;">
      <a href="Shop.dc.html" style="color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.14em;">SHOP</a>
      <a href="Cart.dc.html" aria-label="Cart" style="display: flex;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><path d="M3 6h18"></path><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
      </a>
    </div>
  </div>

  <div data-screen-label="Lookbook" style="padding: 32px 22px 72px;">
    <div style="font-size: 11px; letter-spacing: 0.32em; color: #c084fc; font-weight: 700; margin-bottom: 16px;">LOOKBOOK</div>
    <h1 style="font-family: 'Anton', sans-serif; font-size: clamp(30px, 9vw, 40px); margin: 0; color: #fff; text-transform: uppercase; line-height: 1.15;">SEEN IN THE WILD.</h1>
    <p style="font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.55); margin: 16px 0 0 0;">Campaign shots from the current drop. Drop your own photos into any frame.</p>

    <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 44px;">
      <div style="width: 100%; aspect-ratio: 3/4; border: 1px solid rgba(255,255,255,0.08);">
        <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="look-1" shape="rect" placeholder="Drop campaign shot 01" hint-size="100%,100%"></x-import>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div style="aspect-ratio: 3/4; border: 1px solid rgba(255,255,255,0.08);">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="look-2" shape="rect" placeholder="Shot 02" hint-size="100%,100%"></x-import>
        </div>
        <div style="aspect-ratio: 3/4; border: 1px solid rgba(255,255,255,0.08);">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="look-3" shape="rect" placeholder="Shot 03" hint-size="100%,100%"></x-import>
        </div>
      </div>
      <div style="width: 100%; aspect-ratio: 3/4; border: 1px solid rgba(255,255,255,0.08);">
        <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="look-4" shape="rect" placeholder="Drop campaign shot 04" hint-size="100%,100%"></x-import>
      </div>
    </div>

    <a href="Shop.dc.html" style="display: block; margin-top: 44px;">
      <button style="width: 100%; background: #9b30ff; color: #fff; border: none; padding: 18px 24px; font-size: 14px; font-weight: 700; letter-spacing: 0.16em; cursor: pointer; font-family: 'Barlow', sans-serif; clip-path: polygon(0 0, 100% 0, 100% 70%, 96% 100%, 0 100%); box-shadow: 0 0 20px rgba(155,48,255,0.4);">
        SHOP THE DROP
      </button>
    </a>
  </div>

  <div style="width: 100%; background: #050406; padding: 32px 22px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.04em;">
    © 2026 Purple Columbus. All Rights Reserved.
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:1400}}"></script>
</body>
</html>
