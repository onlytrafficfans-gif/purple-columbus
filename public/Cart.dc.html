<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0c; }
    * { box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: #c084fc; }
  </style>
</helmet>

<div style="position: relative; width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0a0a0c; color: #f2f0f4; font-family: 'Barlow', sans-serif;">

  <div style="display: flex; align-items: center; justify-content: space-between; padding: 18px 22px;">
    <a href="Shop.dc.html" style="display: flex; align-items: center; gap: 8px; color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.14em;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><path d="m11 18-6-6 6-6"></path></svg>
      SHOP
    </a>
  </div>

  <div data-screen-label="Cart" style="padding: 24px 22px 72px;">
    <h1 style="font-family: 'Anton', sans-serif; font-size: clamp(28px, 8.5vw, 36px); margin: 0; color: #fff; text-transform: uppercase; line-height: 1.15;">YOUR CART.</h1>

    <sc-if value="{{ hasItems }}" hint-placeholder-val="{{ false }}">
      <div style="display: flex; flex-direction: column; gap: 24px; margin-top: 36px;">
        <sc-for list="{{ items }}" as="item" hint-placeholder-count="1">
          <div style="display: flex; gap: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
            <div style="width: 84px; height: 108px; flex-shrink: 0; background: #0d0c0f; border: 1px solid rgba(255,255,255,0.08); overflow: hidden;">
              <img src="{{ item.img }}" alt="{{ item.name }}" style="width: 100%; height: 100%; object-fit: cover; object-position: top center;" />
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: space-between;">
              <div>
                <div style="font-size: 14px; font-weight: 700; color: #fff;">{{ item.name }}</div>
                <div style="font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 6px;">{{ item.color }} / {{ item.size }}</div>
              </div>
              <div style="display: flex; align-items: center; justify-content: space-between;">
                <div style="font-family: 'Anton', sans-serif; font-size: 16px; color: #fff;">{{ item.price }}</div>
                <button data-index="{{ item.index }}" onClick="{{ handleRemove }}" style="background: none; border: none; color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 0.08em; cursor: pointer; text-decoration: underline;">REMOVE</button>
              </div>
            </div>
          </div>
        </sc-for>
      </div>

      <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 28px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.15);">
        <div style="font-size: 13px; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); font-weight: 700;">TOTAL</div>
        <div style="font-family: 'Anton', sans-serif; font-size: 24px; color: #fff;">{{ total }}</div>
      </div>

      <button style="margin-top: 28px; width: 100%; background: #9b30ff; color: #fff; border: none; padding: 18px 24px; font-size: 14px; font-weight: 700; letter-spacing: 0.16em; cursor: pointer; font-family: 'Barlow', sans-serif; clip-path: polygon(0 0, 100% 0, 100% 70%, 96% 100%, 0 100%); box-shadow: 0 0 20px rgba(155,48,255,0.4);">
        CHECKOUT
      </button>
    </sc-if>

    <sc-if value="{{ empty }}" hint-placeholder-val="{{ false }}">
      <div style="margin-top: 48px; text-align: center;">
        <p style="font-size: 14px; color: rgba(255,255,255,0.55);">Your cart is empty.</p>
        <a href="Shop.dc.html" style="display: inline-block; margin-top: 20px; color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.12em; border-bottom: 1px solid rgba(255,255,255,0.4); padding-bottom: 4px;">
          SHOP THE DROP →
        </a>
      </div>
    </sc-if>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:700}}">
class Component extends DCLogic {
  state = { cart: [] };

  componentDidMount() {
    this.loadCart();
  }

  loadCart() {
    try {
      const cart = JSON.parse(localStorage.getItem('pc_cart') || '[]');
      this.setState({ cart });
    } catch (e) { this.setState({ cart: [] }); }
  }

  saveCart(cart) {
    localStorage.setItem('pc_cart', JSON.stringify(cart));
    this.setState({ cart });
  }

  renderVals() {
    const items = this.state.cart.map((item, index) => ({ ...item, index }));
    const total = this.state.cart.reduce((sum, item) => sum + (parseFloat(String(item.price).replace('$', '')) || 0), 0);
    return {
      hasItems: items.length > 0,
      empty: items.length === 0,
      items,
      total: '$' + total,
      handleRemove: (e) => {
        const idx = parseInt(e.currentTarget.dataset.index, 10);
        const next = this.state.cart.filter((_, i) => i !== idx);
        this.saveCart(next);
      },
    };
  }
}
</script>
</body>
</html>
