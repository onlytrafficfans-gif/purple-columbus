<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
  <link rel="icon" type="image/png" sizes="64x64" href="./assets/pc-logo-64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/pc-logo-192.png">
  <link rel="apple-touch-icon" href="./assets/pc-logo-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @keyframes __unused__ {}
    html, body { margin: 0; padding: 0; }
  </style>
</helmet>
<div style="position: relative; width: 100%; max-width: 480px; margin: 0 auto; height: 100vh; min-height: 100vh; overflow: hidden; background: #0e0313; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <video
    ref="{{ videoRef }}"
    src="./assets/hero-bg.mp4"
    autoplay="{{ true }}"
    loop="{{ true }}"
    muted="{{ true }}"
    playsinline="{{ true }}"
    webkit-playsinline="{{ true }}"
    preload="auto"
    style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0;"
  ></video>
  <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,4,30,0.15) 0%, rgba(20,4,30,0.35) 60%, rgba(10,2,16,0.85) 100%); z-index: 1;"></div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  videoRef = React.createRef();

  componentDidMount() {
    const v = this.videoRef.current;
    if (!v) return;
    v.muted = true;
    v.loop = true;
    v.playsInline = true;
    const tryPlay = () => v.play().catch(() => {});
    tryPlay();
    v.addEventListener('loadedmetadata', tryPlay);
  }

  renderVals() {
    return { videoRef: this.videoRef };
  }
}
</script>
</body>
</html>
