<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
  <link rel="icon" type="image/png" sizes="64x64" href="./assets/pc-logo-64.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/pc-logo-192.png">
  <link rel="apple-touch-icon" href="./assets/pc-logo-192.png">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#9b30ff">
  <script src="./pwa-install.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0c; }
    * { box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: #c084fc; }
    input::placeholder { color: rgba(255,255,255,0.4); }
  </style>
</helmet>

<div style="position: relative; width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; background: #0a0a0c; color: #f2f0f4; font-family: 'Barlow', sans-serif;">

  <div style="display: flex; align-items: center; justify-content: space-between; padding: 18px 22px;">
    <a href="Purple Columbus Homepage.dc.html" style="display: flex; align-items: center; gap: 8px; color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.14em;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><path d="m11 18-6-6 6-6"></path></svg>
      HOME
    </a>
  </div>

  <div data-screen-label="Account" style="padding: 24px 22px 72px;">
    <div style="font-size: 11px; letter-spacing: 0.32em; color: #c084fc; font-weight: 700; margin-bottom: 16px;">ACCOUNT</div>
    <h1 style="font-family: 'Anton', sans-serif; font-size: clamp(28px, 8.5vw, 36px); margin: 0; color: #fff; text-transform: uppercase; line-height: 1.15;">SIGN IN.</h1>
    <p style="font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.55); margin: 16px 0 0 0;">Track orders and save your info for next time.</p>

    <div style="display: flex; flex-direction: column; gap: 14px; margin-top: 36px;">
      <input type="email" placeholder="Email" value="{{ email }}" onChange="{{ handleEmail }}" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 15px 16px; font-size: 14px; font-family: 'Barlow', sans-serif;" />
      <input type="password" placeholder="Password" value="{{ password }}" onChange="{{ handlePassword }}" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 15px 16px; font-size: 14px; font-family: 'Barlow', sans-serif;" />
      <button onClick="{{ handleSignIn }}" style="margin-top: 8px; background: #9b30ff; color: #fff; border: none; padding: 17px 24px; font-size: 13px; font-weight: 700; letter-spacing: 0.16em; cursor: pointer; font-family: 'Barlow', sans-serif; clip-path: polygon(0 0, 100% 0, 100% 70%, 96% 100%, 0 100%); box-shadow: 0 0 20px rgba(155,48,255,0.4);">
        SIGN IN
      </button>
      <sc-if value="{{ message }}" hint-placeholder-val="{{ false }}">
        <div style="font-size: 13px; color: #c084fc; font-weight: 600; margin-top: 4px;">{{ message }}</div>
      </sc-if>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:700}}">
class Component extends DCLogic {
  state = { email: '', password: '', message: '' };

  renderVals() {
    return {
      email: this.state.email,
      password: this.state.password,
      message: this.state.message,
      handleEmail: (e) => this.setState({ email: e.target.value }),
      handlePassword: (e) => this.setState({ password: e.target.value }),
      handleSignIn: () => {
        if (!this.state.email.trim() || !this.state.password.trim()) {
          this.setState({ message: 'Enter your email and password to continue.' });
        } else {
          this.setState({ message: 'Signed in — welcome back.' });
        }
      },
    };
  }
}
</script>
</body>
</html>
